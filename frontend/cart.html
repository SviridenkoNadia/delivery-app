<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FoodRush — Cart</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">🍔 FoodRush</div>
      <nav>
        <a href="index.html" class="nav-link">Shop</a>
        <a href="cart.html" class="nav-link active">
          Shopping Cart
          <span id="cart-badge" class="cart-badge" style="display:none">0</span>
        </a>
        <a href="history.html" class="nav-link">History</a>
      </nav>
    </div>
  </header>

  <main class="cart-layout">
    <div class="cart-container">
      <h2>🛒 Your Cart</h2>

      <p id="empty-cart-msg" class="empty-msg" style="display:none">
        Your cart is empty. <a href="index.html">Browse shops →</a>
      </p>

      <div id="cart-items"></div>

      <div id="checkout-section" style="display:none">
        <div class="cart-total-row">
          <span>Total:</span>
          <span class="total-amount">₴<span id="total-price">0</span></span>
        </div>

        <hr />

        <h3>Delivery Details</h3>
        <form id="order-form" class="order-form" novalidate>
          <div class="form-group">
            <label for="name">Name *</label>
            <input id="name" type="text" placeholder="Your full name" />
            <span id="name-error" class="field-error" style="display:none"></span>
          </div>

          <div class="form-group">
            <label for="email">Email *</label>
            <input id="email" type="email" placeholder="your@email.com" />
            <span id="email-error" class="field-error" style="display:none"></span>
          </div>

          <div class="form-group">
            <label for="phone">Phone *</label>
            <input id="phone" type="tel" placeholder="+380 XX XXX XXXX" />
            <span id="phone-error" class="field-error" style="display:none"></span>
          </div>

          <div class="form-group">
            <label for="address">Delivery Address *</label>
            <input id="address" type="text" placeholder="Street, City" />
            <span id="address-error" class="field-error" style="display:none"></span>
          </div>

          <button id="submit-btn" type="submit" class="submit-btn">Submit Order</button>
        </form>
      </div>

      <div id="success-message" class="success-message" style="display:none">
        <div class="success-inner">
          <span class="success-icon">✅</span>
          <h3>Order placed successfully!</h3>
          <p>Order ID: <strong>#<span id="success-order-id"></span></strong></p>
          <p>You can track it on the <a href="history.html">History</a> page.</p>
          <a href="index.html" class="submit-btn" style="display:inline-block;text-decoration:none;margin-top:16px">
            Order more →
          </a>
        </div>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
